theme: jekyll-vitepress-theme

title: Rails Error Dashboard
description: Self-hosted error tracking and exception monitoring for Ruby on Rails. Open source, free forever. A Sentry alternative with cause chains, analytics, workflow management, and multi-channel notifications.
url: https://anjanj.github.io
baseurl: /rails_error_dashboard
lang: en

# Markdown
markdown: kramdown
kramdown:
  input: GFM

# Permalink
permalink: pretty

# GitHub metadata
github:
  repository_url: https://github.com/AnjanJ/rails_error_dashboard
  is_project_page: true

# Collections
collections:
  getting_started:
    output: true
    permalink: /docs/:slug/
  guides:
    output: true
    permalink: /docs/guides/:slug/
  features:
    output: true
    permalink: /docs/features/:slug/
  reference:
    output: true
    permalink: /docs/reference/:slug/

# Theme configuration
jekyll_vitepress:
  branding:
    site_title: Rails Error Dashboard

  syntax:
    light_theme: github
    dark_theme: github.dark

  footer:
    home_only: false
    message: "Made with ❤️ by <a href='https://github.com/AnjanJ'>Anjan Jagirdar</a> · Docs theme by <a href='https://jekyll-vitepress.dev/'>Jekyll VitePress Theme</a>"

  doc_footer:
    enabled: true

  last_updated:
    enabled: true
    format: "%-d %b %Y"

  edit_link:
    enabled: true
    pattern: "https://github.com/AnjanJ/rails_error_dashboard/edit/main/:path"

  github_star:
    enabled: true
    repo: AnjanJ/rails_error_dashboard

  labels:
    outline: "On this page"
    sidebar_menu: "Menu"
    appearance: "Appearance"
    prev: "Previous"
    next: "Next"
    last_updated: "Last updated"
    edit_link: "Edit this page on GitHub"
    return_to_top: "Return to top"

  scroll_offset: 134

# Plugins
plugins:
  - jekyll-vitepress-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing (only collections and root .md files are part of the site)
exclude:
  - Gemfile
  - Gemfile.lock
  - Gemfile.pages
  - Rakefile
  - "*.gemspec"
  - "*.gem"
  - node_modules
  - vendor
  - app
  - bin
  - config
  - db
  - lib
  - spec
  - test
  - tmp
  - log
  - coverage
  - scripts
  - tasks
  - blog
  - seo
  - gemfiles
  - lefthook.yml
  - .git
  - .github
  - .claude
  - docs
  - CLAUDE.md
  - CHANGELOG.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - MIT-LICENSE
  - README.md
  - SECURITY.md
  - ROADMAP.md
  - HOST_APP_SAFETY.md
  - DEEP_INTROSPECTION_ANALYSIS.md
  - FAULTLINE_COMPARISON.md
  - TIMESERIES_ANALYSIS.md
