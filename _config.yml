theme: jekyll-theme-hacker
title: Rails Error Dashboard
description: Self-hosted error tracking and exception monitoring for Ruby on Rails. Open source, free forever. A Sentry alternative with cause chains, analytics, workflow management, and multi-channel notifications.
show_downloads: true
url: https://anjanj.github.io
baseurl: /rails_error_dashboard
lang: en

# GitHub metadata
github:
  repository_url: https://github.com/AnjanJ/rails_error_dashboard
  is_project_page: true

# Navigation (for Jekyll themes that support it)
navigation:
  - name: Home
    url: /
  - name: Quickstart
    url: /docs/QUICKSTART
  - name: Documentation
    url: /docs/
  - name: Multi-App Support
    url: /docs/MULTI_APP_PERFORMANCE
  - name: API Reference
    url: /docs/API_REFERENCE
  - name: Customization
    url: /docs/CUSTOMIZATION
  - name: Plugins
    url: /docs/PLUGIN_SYSTEM

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing (only docs/ and root .md files are part of the site)
exclude:
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - "*.gemspec"
  - "*.gem"
  - node_modules
  - vendor
  - app
  - bin
  - config
  - db
  - lib
  - spec
  - test
  - tmp
  - log
  - coverage
  - scripts
  - tasks
  - blog
  - seo
  - gemfiles
  - lefthook.yml
  - .git
  - .github
  - .claude
